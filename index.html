<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クーポンコレクター問題 シミュレーター</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #f5f7fa;
      color: #333;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px 24px;
      max-width: 860px;
      margin: 0 auto 20px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
    }

    input[type="number"] {
      width: 140px;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      padding: 9px 24px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #357abd; }
    button:disabled { background: #aaa; cursor: default; }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 16px;
    }

    .stat-box {
      flex: 1;
      min-width: 160px;
      background: #f0f4ff;
      border-radius: 8px;
      padding: 12px 16px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #333;
    }

    .chart-wrap {
      position: relative;
      height: 380px;
    }

    .progress-bar-wrap {
      background: #eee;
      border-radius: 4px;
      height: 6px;
      margin-top: 12px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      background: #4a90e2;
      width: 0%;
      transition: width 0.1s;
    }

    .hint {
      font-size: 0.78rem;
      color: #888;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<h1>クーポンコレクター問題 シミュレーター</h1>
<p class="subtitle">全種類のクーポンを集めるまでの回数の平均が理論値に収束する様子を可視化します</p>

<div class="card">
  <div class="controls">
    <div class="field">
      <label for="numCoupons">クーポンの種類数 (n)</label>
      <input type="number" id="numCoupons" value="3" min="2" max="1000">
    </div>
    <div class="field">
      <label for="numTrials">試行回数</label>
      <input type="number" id="numTrials" value="100000" min="100" max="10000000">
    </div>
    <button id="runBtn" onclick="startSimulation()">シミュレーション実行</button>
  </div>
  <p class="hint">
    理論値: E[T] = n × (1 + 1/2 + 1/3 + … + 1/n)　例) n=3 のとき E[T] = 5.5
  </p>
  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<div class="card">
  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">理論値 E[T]</div>
      <div class="stat-value" id="statTheory">5.5</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">シミュレーション平均</div>
      <div class="stat-value" id="statSim">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">完了した試行回数</div>
      <div class="stat-value" id="statTrials">—</div>
    </div>
  </div>
</div>

<div class="card">
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
  // --- Coupon Collector theoretical value: E[T] = n * H(n)
  function theoretical(n) {
    let s = 0;
    for (let k = 1; k <= n; k++) s += 1 / k;
    return n * s;
  }

  // --- Single trial: draw random coupons until all n collected
  function runTrial(n) {
    const seen = new Set();
    let draws = 0;
    while (seen.size < n) {
      seen.add(Math.floor(Math.random() * n));
      draws++;
    }
    return draws;
  }

  const MAX_CHART_POINTS = 300;

  // --- Build logarithmically-spaced sample indices in [1, total]
  function sampleIndices(total) {
    const numPoints = Math.min(total, MAX_CHART_POINTS);
    const pts = new Set([1]);
    for (let i = 1; i <= numPoints; i++) {
      const idx = Math.round(Math.pow(total, i / numPoints));
      pts.add(Math.min(idx, total));
    }
    pts.add(total);
    return Array.from(pts).sort((a, b) => a - b);
  }

  // --- Chart setup
  let chart = null;

  function initChart() {
    const ctx = document.getElementById("chart").getContext("2d");
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: "line",
      data: {
        datasets: [
          {
            label: "シミュレーション平均",
            data: [],
            borderColor: "#4a90e2",
            backgroundColor: "rgba(74,144,226,0.08)",
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.1,
            fill: false,
          },
          {
            label: "理論値 E[T]",
            data: [],
            borderColor: "#e25c4a",
            borderWidth: 2,
            borderDash: [6, 4],
            pointRadius: 0,
            fill: false,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        scales: {
          x: {
            type: "logarithmic",
            title: { display: true, text: "試行回数" },
            ticks: {
              callback: (v) =>
                v === 1 || v === 10 || v === 100 || v === 1000 ||
                v === 10000 || v === 100000 || v === 1000000 || v === 10000000
                  ? v.toLocaleString()
                  : "",
            },
          },
          y: {
            title: { display: true, text: "平均（全種類集めるまでの回数）" },
            beginAtZero: false,
          },
        },
        plugins: {
          legend: { position: "top" },
          tooltip: {
            callbacks: {
              title: (items) => "試行回数: " + Number(items[0].parsed.x).toLocaleString(),
              label: (item) => item.dataset.label + ": " + item.parsed.y.toFixed(4),
            },
          },
        },
      },
    });
  }

  // --- Run simulation in chunks to keep UI responsive
  function startSimulation() {
    const n = parseInt(document.getElementById("numCoupons").value, 10);
    const total = parseInt(document.getElementById("numTrials").value, 10);

    if (!n || n < 2 || !total || total < 1) {
      alert("クーポンの種類数は2以上、試行回数は1以上の整数を入力してください。");
      return;
    }

    const theory = theoretical(n);
    document.getElementById("statTheory").textContent = theory.toFixed(4);
    document.getElementById("statSim").textContent = "—";
    document.getElementById("statTrials").textContent = "—";

    initChart();

    const samples = sampleIndices(total);
    const simData = [];
    const theoryData = samples.map((x) => ({ x, y: theory }));

    // Update theory line immediately
    chart.data.datasets[1].data = theoryData;
    chart.update();

    const btn = document.getElementById("runBtn");
    btn.disabled = true;

    const progressWrap = document.getElementById("progressWrap");
    const progressBar = document.getElementById("progressBar");
    progressWrap.style.display = "block";
    progressBar.style.width = "0%";

    let totalDraws = 0;
    let trial = 0;
    let sampleIdx = 0;

    // Process 5000 trials per animation frame to balance responsiveness and speed
    const CHUNK = 5000;

    function step() {
      const end = Math.min(trial + CHUNK, total);
      while (trial < end) {
        trial++;
        totalDraws += runTrial(n);

        // Record sample point
        if (sampleIdx < samples.length && trial === samples[sampleIdx]) {
          simData.push({ x: trial, y: totalDraws / trial });
          sampleIdx++;
        }
      }

      // Update chart & stats periodically
      chart.data.datasets[0].data = simData.slice();
      chart.update();

      const pct = Math.round((trial / total) * 100);
      progressBar.style.width = pct + "%";
      document.getElementById("statTrials").textContent = trial.toLocaleString();
      document.getElementById("statSim").textContent = (totalDraws / trial).toFixed(4);

      if (trial < total) {
        requestAnimationFrame(step);
      } else {
        btn.disabled = false;
        progressWrap.style.display = "none";
      }
    }

    requestAnimationFrame(step);
  }

  // Initialize chart on load
  initChart();
  document.getElementById("statTheory").textContent = theoretical(3).toFixed(4);
</script>
</body>
</html>
